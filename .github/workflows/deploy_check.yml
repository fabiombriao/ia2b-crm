## github action to check deployment success
## curl the deployment url and check for 200 status
## deployment url must be configured via repo variable DEPLOY_CHECK_BASE_URL
name: Deploy Check

on:
  pull_request:

# If two pushes happen within a short time in the same PR, cancel the run of the oldest push
concurrency:
  group: pr-${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  deployment_check:
    name: Check Deployment
    runs-on: ubuntu-latest
    env:
      DEPLOY_CHECK_BASE_URL: ${{ vars.DEPLOY_CHECK_BASE_URL }}
    steps:
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Print Deployment URL
        run: echo "${DEPLOY_CHECK_BASE_URL:-<not configured>}"
      - name: Check Deployment Status
        run: |
          if [ -z "${DEPLOY_CHECK_BASE_URL:-}" ]; then
            echo "DEPLOY_CHECK_BASE_URL is not configured; skipping deploy check."
            exit 0
          fi

          BASE_URL="${DEPLOY_CHECK_BASE_URL%/}"
          max_attempts=10
          attempt=1
          status_code=0
          echo "Waiting for review app to be deployed/redeployed, trying in  10 minutes..."
          sleep 600
          while [ $attempt -le $max_attempts ]; do
            response=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" "${BASE_URL}/api")
            status_code=$(echo $response | head -n   1)
            if [ $status_code -eq   200 ]; then
              body=$(curl -s --max-time 15 "${BASE_URL}/api")
              if echo "$body" | jq -e '.version and .timestamp and .queue_services == "ok" and .data_services == "ok"' > /dev/null; then
                echo "Deployment successful"
                exit 0
              else
                echo "Deployment status unknown, retrying in   3 minutes..."
                sleep 180
              fi
            else
              echo "Waiting for review app to be ready, retrying in  3 minutes..."
              sleep 180
              attempt=$((attempt +  1))
            fi
          done
          echo "Deployment failed after $max_attempts attempts"
          exit  1
