name: Deploy to VPS

on:
  push:
    branches:
      - develop
  workflow_dispatch: {}

concurrency:
  group: vps-deploy-develop
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: vps
    steps:
      - name: Configure SSH
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if [[ -n "${VPS_SSH_KEY_B64:-}" ]]; then
            echo "${VPS_SSH_KEY_B64}" | base64 -d > ~/.ssh/id_rsa
          else
            printf '%s' "${VPS_SSH_KEY:-}" > ~/.ssh/id_rsa
          fi

          tr -d '\r' < ~/.ssh/id_rsa > ~/.ssh/id_rsa.tmp && mv ~/.ssh/id_rsa.tmp ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          if ! grep -q "PRIVATE KEY" ~/.ssh/id_rsa; then
            echo "Invalid VPS_SSH_KEY: expected a PRIVATE key (BEGIN ... PRIVATE KEY)."
            echo "Tip: if your secret is losing newlines, store it as base64 in VPS_SSH_KEY_B64."
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            echo "SSH key is unreadable or encrypted with a passphrase. Use an unencrypted deploy key."
            exit 1
          fi

      - name: Deploy (git pull + rebuild + migrate)
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail

          if [[ -z "${VPS_HOST}" || -z "${VPS_PORT}" || -z "${VPS_USER}" ]]; then
            echo "Missing one of: VPS_HOST, VPS_PORT, VPS_USER"
            exit 1
          fi

          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "${VPS_PORT}" \
            "${VPS_USER}@${VPS_HOST}" \
            'bash -lc '"'"'
              set -euo pipefail

              cd /opt/ia2b/ia2b-crm
              git fetch origin develop
              git checkout develop
              git reset --hard origin/develop

              cd /opt/ia2b/chatwoot
              docker compose build rails
              docker compose up -d

              docker compose exec -T rails sh -lc "POSTGRES_STATEMENT_TIMEOUT=600s bundle exec rails db:chatwoot_prepare"
              docker compose restart rails sidekiq

              command -v curl >/dev/null 2>&1 && curl -sk --max-time 15 https://ia2bhub.duckdns.org/api || true
              echo
              echo "DEPLOY_OK"
            '"'"''
